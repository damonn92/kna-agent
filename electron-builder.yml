appId: com.wearekna.desktop
productName: KNA Agent
copyright: Copyright © 2026 KNA Inc.
compression: maximum
# Use a hyphen-separated artifactName (NOT ${productName} which contains the
# literal space "KNA Desktop"). electron-builder writes latest-mac.yml with
# spaces converted to hyphens, while GitHub release assets URL-encode spaces
# as dots — the three forms don't match and electron-updater 404s. Forcing
# hyphens here keeps the on-disk filename, latest-mac.yml URLs, and GitHub
# release asset URLs all aligned, so auto-update can find the file.
artifactName: KNA-Desktop-${version}-${os}-${arch}.${ext}

# Register kna-desktop:// custom URL scheme so the system browser can hand
# the SSO callback (kna-desktop://login?token=...) back to this app after a
# user logs in on code.wearekna.com. electron-builder writes:
#   - CFBundleURLTypes on macOS
#   - Windows registry HKCR\kna-desktop on Win
#   - MimeType x-scheme-handler/kna-desktop in the .desktop file on Linux
protocols:
  - name: KNA Desktop
    schemes:
      - kna-desktop

directories:
  output: release
  buildResources: resources

files:
  - dist
  - dist-electron
  - package.json

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"
      - "!icons/*.md"
      - "!icons/*.svg"
      - "!bin/**"
      - "!screenshot/**"
  # OpenClaw package (node_modules copied separately by afterPack hook
  # because electron-builder respects .gitignore which excludes node_modules/)
  - from: build/openclaw/
    to: openclaw/
  # Pre-bundled third-party skills (full directories, not only SKILL.md)
  - from: build/preinstalled-skills/
    to: resources/preinstalled-skills/
  # NOTE: OpenClaw plugin mirrors (dingtalk, etc.) are bundled by the
  # afterPack hook (after-pack.cjs) directly from node_modules, so they
  # don't need an extraResources entry here.

afterPack: ./scripts/after-pack.cjs

asar: true
asarUnpack:
  - "**/*.node"
  # lru-cache CJS/ESM interop: older CJS versions (v5, v6, v7) don't export
  # `LRUCache` as a named property, breaking `import { LRUCache }` in Node.js
  # 22+ (Electron 40+).  Unpacking lets afterPack patch them in place.
  - "**/node_modules/lru-cache/**"

# Disable native module rebuilding.
# The Electron renderer/main process has no native (.node) dependencies.
# All native modules (opus, sharp, koffi …) belong to openclaw, which is
# bundled separately (bundle-openclaw.mjs → extraResources) and runs in its
# own process — @electron/rebuild must NOT touch them.
npmRebuild: false

# Auto-update configuration.
# electron-updater reads this section to bake an `app-update.yml` into the
# packaged app. At runtime the updater queries GitHub Releases API on a
# timer; with `autoDownload = true` (see electron/main/updater.ts) a newer
# dmg is pulled silently in the background while the app keeps running.
# When the download finishes, the renderer's UpdateIndicator shows a
# coral 🆕 chip; clicking it sends IPC `update:install` → quitAndInstall().
publish:
  provider: github
  owner: damonn92
  repo: kna-agent
  releaseType: release

# macOS Configuration
mac:
  extraResources:
    - from: resources/bin/darwin-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  # Ship both .dmg (primary user download, drag-to-install) and .zip
  # (required by electron-updater for in-app auto-update). dmg is the
  # macOS standard — `unzip` strips xattr/symlinks and breaks the code
  # signature for many users, while .dmg preserves the .app bundle bit-
  # perfect inside a disk image.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  darkModeSupport: true
  # Code signing + notarization (Apple Developer ID, team 9SZ4Y9U2U7).
  # electron-builder picks up:
  #   - CSC_LINK (base64-encoded .p12 cert)   → from GHA secret
  #   - CSC_KEY_PASSWORD (.p12 password)      → from GHA secret
  #   - APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID → notarytool creds
  # hardenedRuntime is required by Apple's notary service; entitlements file
  # ships in resources/entitlements.mac.plist (electron's default).
  hardenedRuntime: true
  gatekeeperAssess: false
  # notarize: false — we ship signed-only (no Apple Notary) for v0.2.0.
  # Two reasons:
  #   1. GHA macos runners' xcrun notarytool URLSession drops at ~54 min into
  #      polling on first-team submissions (consistent failure across 3 runs,
  #      both Apple-ID and App Store Connect API key auth paths). Apple's
  #      first-time team review window happens to hit exactly that bug window.
  #   2. Signing alone unlocks the headline UX wins — Squirrel.Mac auto-update
  #      works (it only requires a valid Developer ID signature, not notary),
  #      and first-launch friction drops from "user runs xattr command" to
  #      "user right-clicks → Open once".
  # Proper notarize comes back later via a separate notarize-and-staple
  # workflow with our own robust polling loop, so the build job doesn't have
  # to keep notarytool's flaky URLSession alive for an hour.
  notarize: false
  extendInfo:
    NSMicrophoneUsageDescription: KNA Desktop 在使用语音功能时需要访问麦克风
    NSCameraUsageDescription: KNA Desktop 在使用视频功能时需要访问摄像头

dmg:
  # Bumped temp volume to 1500m (was 900m). Gives ~700MB of headroom
  # post-signing so dmg-builder doesn't have to fight for space.
  size: 1500m
  # Skip the dmgbuild shrink step entirely. dmg-builder@1.2.0 on macOS 14
  # GHA runners has a known bug where `hdiutil resize -shrinkonly` returns
  # empty output despite exit 0, which dmgbuild misinterprets as failure
  # ("Unable to shrink: "). Without shrink, the dmg is slightly larger
  # (matches our `size:` value), but the compression step (UDZO format)
  # still runs, so final .dmg size is similar to compressed-shrunk.
  shrink: false
  # Skip optional update-info metadata write that occasionally trips
  # hdiutil on the runner.
  writeUpdateInfo: false
  background: resources/dmg-background.png
  icon: resources/icons/icon.icns
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - type: file
      x: 130
      y: 220
    - type: link
      path: /Applications
      x: 410
      y: 220

# Windows Configuration
win:
  # Skip update signature verification: we ship via OSS + GitHub without a
  # code-signing certificate, so verifying would always fail on the updater.
  verifyUpdateCodeSignature: false
  extraResources:
    - from: resources/bin/win32-${arch}
      to: bin
    - from: resources/cli/win32/
      to: cli/
  icon: resources/icons/icon.ico
  target:
    - target: nsis
      arch: x64

nsis:
  oneClick: false
  perMachine: false
  warningsAsErrors: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  differentialPackage: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KNA Desktop
  uninstallDisplayName: KNA Desktop
  license: LICENSE
  include: scripts/installer.nsh
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

# Linux Configuration
linux:
  extraResources:
    - from: resources/bin/linux-${arch}
      to: bin
    - from: resources/cli/posix/
      to: cli/
  icon: resources/icons
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
        - arm64
    - target: rpm
      arch:
        - x64
  category: Utility
  maintainer: KNA Inc. <info@wearekna.com>
  vendor: KNA Inc.
  synopsis: KNA — 用人民币驱动 Claude · 中国大陆开发者直连
  description: KNA Desktop 是面向中国大陆开发者与 SMB 用户的 Claude 桌面助手。预置 KNA API 中转（引流期 1.5 折）、跨境电商 / 内容创作 / 数据分析等中文场景 skill 包，免 CLI 配置，下载即用。
  desktop:
    entry:
      Name: KNA Desktop
      Comment: KNA — 用人民币驱动 Claude
      Categories: Utility;Network;Office;
      Keywords: ai;claude;anthropic;kna;助手;
      StartupWMClass: kna-desktop

appImage:
  license: LICENSE

deb:
  depends:
    # Use OR syntax to support both Ubuntu 22.04 and Ubuntu 24.04 (t64 transition).
    # Ubuntu 24.04 renamed many libraries with a t64 suffix (64-bit time_t ABI transition).
    - libgtk-3-0 | libgtk-3-0t64
    - libnotify4 | libnotify4t64
    - libnss3
    - libxss1 | libxss1t64
    - libxtst6 | libxtst6t64
    - xdg-utils
    - libatspi2.0-0 | libatspi2.0-0t64
    - libuuid1
  afterInstall: scripts/linux/after-install.sh
  afterRemove: scripts/linux/after-remove.sh
