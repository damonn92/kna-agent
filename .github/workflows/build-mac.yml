name: Build macOS dmg

# Builds an unsigned KNA Desktop .dmg on GitHub-hosted macOS runners.
# Triggered manually (workflow_dispatch) or on tag push (v*).
# Local dev machines on tight disks would otherwise spend hours on this.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # for tag-based release upload

jobs:
  build:
    runs-on: macos-14   # arm64 runner — matches our primary target
    # 120 min — Apple notarytool is slow on a team's first few submissions
    # (extra Apple review for unknown signers). Subsequent builds will fit
    # comfortably in <30 min once the team is recognized.
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uv binary (OpenClaw runtime dep)
        run: pnpm run uv:download

      - name: Generate extension bridge stubs (required for typecheck)
        run: pnpm run ext:bridge

      - name: Type check
        run: pnpm run typecheck

      - name: Build dmg (signed + notarized)
        env:
          # Apple Developer ID Application cert + password — electron-builder
          # auto-imports the .p12 into a temporary keychain for the build.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
          # Notarytool creds — Apple ID + app-specific password (not your
          # AppleID password). Team ID matches the one in electron-builder.yml.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SKIP_PREINSTALLED_SKILLS: '1'   # speeds up first-pass builds; skill bundle can be re-enabled when needed
        run: pnpm run package:mac:local

      - name: Verify dmg produced
        run: |
          ls -lh release/*.dmg
          shasum -a 256 release/*.dmg > release/SHA256SUMS

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: kna-desktop-mac-arm64
          path: |
            release/*.dmg
            release/SHA256SUMS
          retention-days: 14
          if-no-files-found: error

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/SHA256SUMS
          draft: false
          prerelease: false
