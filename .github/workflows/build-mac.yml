name: Build macOS dmg

# Builds an unsigned KNA Desktop .dmg on GitHub-hosted macOS runners.
# Triggered manually (workflow_dispatch) or on tag push (v*).
# Local dev machines on tight disks would otherwise spend hours on this.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # for tag-based release upload

jobs:
  build:
    runs-on: macos-14   # arm64 runner — matches our primary target
    # 120 min — Apple notarytool is slow on a team's first few submissions
    # (extra Apple review for unknown signers). Subsequent builds will fit
    # comfortably in <30 min once the team is recognized.
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download uv binary (OpenClaw runtime dep)
        run: pnpm run uv:download

      - name: Generate extension bridge stubs (required for typecheck)
        run: pnpm run ext:bridge

      - name: Type check
        run: pnpm run typecheck

      # Decode the App Store Connect API key from base64 → temp .p8 file so
      # electron/notarize can pass its path to `xcrun notarytool`. The .p8
      # never lives on disk in source form, only in this ephemeral location
      # under the runner's $RUNNER_TEMP (auto-cleaned on job exit).
      - name: Stage App Store Connect API key
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          echo "${{ secrets.APPLE_API_KEY }}" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/notary/AuthKey.p8"
          echo "APPLE_API_KEY=$RUNNER_TEMP/notary/AuthKey.p8" >> $GITHUB_ENV

      - name: Build dmg (signed, notarize deferred) — retry up to 3x for hdiutil flake
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'true'
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SKIP_PREINSTALLED_SKILLS: '1'
        run: |
          set +e
          # GHA macos-14 runners sometimes fail dmgbuild's hdiutil with
          # "Device not configured" — apparently transient /dev/disk
          # allocation glitches. Retry up to 3 times with cleanup in between.
          for attempt in 1 2 3; do
            echo "============================================================"
            echo "Build attempt $attempt / 3"
            echo "============================================================"
            df -h /
            pnpm run package:mac:local
            rc=$?
            if [ $rc -eq 0 ]; then
              echo "✓ Build succeeded on attempt $attempt"
              exit 0
            fi
            echo "✗ Build attempt $attempt failed (exit $rc)"
            # Detach any leftover disk images so the next try has a fresh
            # /dev/disk pool. The `awk` only picks /dev/diskN entries.
            hdiutil info 2>/dev/null | awk '/^\/dev\/disk[0-9]+ /{print $1}' | while read d; do
              echo "  detaching stale image $d"
              hdiutil detach "$d" -force 2>&1 || true
            done
            # Remove partial outputs so next attempt starts clean
            rm -rf release/*.dmg release/*.zip release/latest-mac.yml 2>/dev/null || true
            sleep 30
          done
          echo "✗ All 3 build attempts failed"
          exit 1

      # Notarize via custom polling loop — bypasses @electron/notarize's
      # `xcrun notarytool submit --wait` URLSession bug that drops the
      # connection at ~54 min into the wait. We instead:
      #   1. submit --no-wait → get submission ID immediately
      #   2. poll `notarytool info` every 30 s, each call a separate
      #      short-lived HTTPS request (no long connection to maintain)
      #   3. retry-once on transient network glitches per call
      #   4. once Apple says "Accepted", `xcrun stapler staple` the dmg
      # APPLE_API_KEY env var is the .p8 path exported by the earlier
      # "Stage App Store Connect API key" step.
      - name: Notarize + staple dmgs
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          set -e
          for DMG in release/*.dmg; do
            echo "============================================================"
            echo "Submitting $DMG to Apple notary…"
            echo "============================================================"

            SUBMIT_JSON=$(xcrun notarytool submit "$DMG" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --output-format json \
              --no-wait)
            echo "$SUBMIT_JSON"
            SUBMISSION_ID=$(echo "$SUBMIT_JSON" | jq -r '.id')
            echo "Submission ID: $SUBMISSION_ID"

            # Poll up to 100 min @ 30 s intervals (200 attempts). Each call
            # is a fresh HTTPS request so a connection drop affects only
            # that single call, not the whole wait.
            STATUS="In Progress"
            for ((i=1; i<=200; i++)); do
              INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
                --key "$APPLE_API_KEY" \
                --key-id "$APPLE_API_KEY_ID" \
                --issuer "$APPLE_API_ISSUER" \
                --output-format json 2>/dev/null) || {
                  # Single retry on transient failure
                  sleep 10
                  INFO_JSON=$(xcrun notarytool info "$SUBMISSION_ID" \
                    --key "$APPLE_API_KEY" \
                    --key-id "$APPLE_API_KEY_ID" \
                    --issuer "$APPLE_API_ISSUER" \
                    --output-format json 2>/dev/null) || INFO_JSON='{"status":"network-glitch"}'
                }
              STATUS=$(echo "$INFO_JSON" | jq -r '.status')
              echo "  [poll $i/200] status=$STATUS"

              case "$STATUS" in
                "Accepted")
                  echo "✓ Notarize accepted in $((i*30))s"
                  break
                  ;;
                "Invalid"|"Rejected")
                  echo "✗ Notarize REJECTED — full log below"
                  xcrun notarytool log "$SUBMISSION_ID" \
                    --key "$APPLE_API_KEY" \
                    --key-id "$APPLE_API_KEY_ID" \
                    --issuer "$APPLE_API_ISSUER" 2>&1 | head -100
                  exit 1
                  ;;
                *)
                  sleep 30
                  ;;
              esac
            done

            if [ "$STATUS" != "Accepted" ]; then
              echo "✗ Notarize did not finish within 100 min"
              exit 1
            fi

            echo "Stapling ticket into $DMG…"
            xcrun stapler staple "$DMG"
            xcrun stapler validate "$DMG"
            echo "✓ $DMG fully notarized + stapled"
          done

      - name: Verify artifacts produced
        run: |
          ls -lh release/*.dmg release/*.zip release/latest-mac.yml 2>&1
          shasum -a 256 release/*.dmg release/*.zip > release/SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kna-desktop-mac
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/SHA256SUMS
          retention-days: 14
          if-no-files-found: error

      - name: Attach to release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
            release/SHA256SUMS
          draft: false
          prerelease: false
